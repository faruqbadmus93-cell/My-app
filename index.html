<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chat Coach">
<meta name="theme-color" content="#07070f">
<title>Sales Chat Coach</title>
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;Sales Chat Coach&quot;,&quot;short_name&quot;:&quot;Chat Coach&quot;,&quot;start_url&quot;:&quot;/&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#07070f&quot;,&quot;theme_color&quot;:&quot;#6c47ff&quot;}">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body, #root { height: 100%; width: 100%; }
  body {
    font-family: 'Outfit', sans-serif;
    background: #07070f;
    overflow: hidden;
  }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-anim { animation: fadeUp 0.3s ease; }
  textarea { -webkit-appearance: none; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #1c1c2e; border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

const SYSTEM_PROMPT = `You are an expert sales relationship coach. The user is trying to build genuine relationships with potential clients (business owners, website owners, authors, creators) with the long-term goal of offering services like website redesign and SEO — but WITHOUT being salesy upfront.

Your job: When the user tells you what the buyer/prospect just said, you respond with EXACTLY what the user should say back.

Rules:
1. Always sound human, warm, casual and genuine — never robotic or corporate
2. Never push services unless we're deep into the conversation (5+ exchanges) and trust is built
3. Focus first on curiosity, genuine interest, and building rapport
4. When the buyer says "hi how can I help you?" — give a disarming, non-salesy reply
5. If buyer seems cold or suspicious, give a reply that breaks that guard gently
6. Track conversation stage and gradually move from: Curiosity → Warmth → Depth → Value → Natural Offer
7. Keep replies SHORT and conversational — like real DMs, not essays
8. After your reply suggestion, add a brief tip on WHY this works (1 sentence max)
9. Format your response EXACTLY as:
REPLY: [the message they should send]
TIP: [why this works in one sentence]

Always match TikTok/Instagram DM tone — casual, real, no fluff.`;

const CHIPS = [
  "Hi how can I help you?",
  "What do you do?",
  "I'm not interested",
  "How much do you charge?",
  "We already have someone",
  "Who are you?",
];

const STAGES = ["Opening", "Warming Up", "Building Trust", "Going Deeper", "Almost There", "Ready to Offer"];

const GOAL_LABELS = { relationship: "Relationship", pitch: "Pitch", contact: "Get Contact" };

function App() {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [goal, setGoal] = useState("relationship");
  const [stage, setStage] = useState(0);
  const [history, setHistory] = useState([]);
  const [copied, setCopied] = useState(null);
  const [apiKey, setApiKey] = useState(() => localStorage.getItem("sales_coach_key") || "");
  const [keyInput, setKeyInput] = useState("");
  const [keyError, setKeyError] = useState("");
  const bottomRef = useRef(null);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages, loading]);

  function saveKey() {
    if (!keyInput.trim().startsWith("sk-")) {
      setKeyError("Key must start with sk- — check and try again");
      return;
    }
    localStorage.setItem("sales_coach_key", keyInput.trim());
    setApiKey(keyInput.trim());
    setKeyError("");
  }

  async function send(text) {
    if (!text.trim() || loading) return;
    setInput("");
    setLoading(true);
    setMessages(prev => [...prev, { from: "buyer", text }]);
    setStage(Math.min(history.length, STAGES.length - 1));

    const newHistory = [...history, {
      role: "user",
      content: `Buyer said: "${text}"\nGoal: ${goal}\nMessage #${history.length + 1}`,
    }];

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 800,
          system: SYSTEM_PROMPT,
          messages: newHistory,
        }),
      });

      const data = await res.json();

      if (data.error) {
        setMessages(prev => [...prev, { from: "coach", text: "API error: " + data.error.message, tip: null }]);
      } else {
        const fullText = data.content?.[0]?.text || "";
        const replyMatch = fullText.match(/REPLY:\s*([\s\S]*?)(?=TIP:|$)/i);
        const tipMatch = fullText.match(/TIP:\s*(.+)/i);
        const reply = replyMatch ? replyMatch[1].trim() : fullText;
        const tip = tipMatch ? tipMatch[1].trim() : null;
        setMessages(prev => [...prev, { from: "coach", text: reply, tip }]);
        setHistory([...newHistory, { role: "assistant", content: fullText }]);
      }
    } catch (e) {
      setMessages(prev => [...prev, { from: "coach", text: "Network error. Check your connection.", tip: null }]);
    }
    setLoading(false);
  }

  function copyText(text, idx) {
    navigator.clipboard.writeText(text).catch(() => {
      const el = document.createElement("textarea");
      el.value = text;
      document.body.appendChild(el);
      el.select();
      document.execCommand("copy");
      document.body.removeChild(el);
    });
    setCopied(idx);
    setTimeout(() => setCopied(null), 2000);
  }

  // API Key screen
  if (!apiKey) {
    return (
      <div style={{ minHeight: "100vh", background: "#07070f", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <div style={{ background: "#12121e", border: "1px solid #1c1c2e", borderRadius: 24, padding: "36px 24px", width: "100%", maxWidth: 400, textAlign: "center" }}>
          <div style={{ fontSize: 44, marginBottom: 16 }}>🔑</div>
          <div style={{ color: "#f0f0ff", fontWeight: 700, fontSize: 18, marginBottom: 8 }}>Enter API Key</div>
          <div style={{ color: "#444466", fontSize: 13, lineHeight: 1.6, marginBottom: 24 }}>
            Get your free key at{" "}
            <a href="https://console.anthropic.com" target="_blank" style={{ color: "#6c47ff" }}>console.anthropic.com</a>
            {" "}→ Sign up → API Keys → Create Key
          </div>
          {keyError && (
            <div style={{ background: "rgba(255,107,107,0.1)", border: "1px solid rgba(255,107,107,0.3)", borderRadius: 10, padding: "10px 14px", color: "#ff6b6b", fontSize: 13, marginBottom: 12 }}>
              {keyError}
            </div>
          )}
          <input
            type="password"
            placeholder="sk-ant-api03-..."
            value={keyInput}
            onChange={e => setKeyInput(e.target.value)}
            onKeyDown={e => e.key === "Enter" && saveKey()}
            style={{ width: "100%", background: "#0e0e1a", border: "1px solid #1c1c2e", borderRadius: 12, padding: "13px 16px", color: "#f0f0ff", fontSize: 14, fontFamily: "inherit", outline: "none", marginBottom: 12 }}
          />
          <button onClick={saveKey} style={{ width: "100%", background: "linear-gradient(135deg, #6c47ff, #8c5fff)", border: "none", borderRadius: 12, padding: 14, color: "#fff", fontSize: 15, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
            Start Coaching →
          </button>
          <div style={{ color: "#333355", fontSize: 11, marginTop: 14, lineHeight: 1.6 }}>
            🔒 Key saved on your device only. Never shared.
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", background: "#07070f", maxWidth: 500, margin: "0 auto" }}>

      {/* Header */}
      <div style={{ background: "#0a0a14", borderBottom: "1px solid #1c1c2e", padding: "10px 14px", display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
        <div style={{ width: 38, height: 38, borderRadius: 12, background: "linear-gradient(135deg,#6c47ff,#ff6b6b)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>🧠</div>
        <div style={{ flex: 1 }}>
          <div style={{ color: "#f0f0ff", fontWeight: 700, fontSize: 14 }}>Sales Coach AI</div>
          <div style={{ color: "#00d4aa", fontSize: 11, fontWeight: 600 }}>● Tells you exactly what to say</div>
        </div>
        <div style={{ background: "rgba(108,71,255,0.15)", border: "1px solid rgba(108,71,255,0.3)", borderRadius: 20, padding: "3px 10px", fontSize: 11, color: "#6c47ff", fontWeight: 700 }}>
          {STAGES[stage]}
        </div>
      </div>

      {/* Goal bar */}
      <div style={{ background: "rgba(108,71,255,0.04)", borderBottom: "1px solid rgba(108,71,255,0.1)", padding: "7px 14px", display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
        <span style={{ color: "#333355", fontSize: 11, fontWeight: 700 }}>Goal:</span>
        {Object.entries(GOAL_LABELS).map(([k, v]) => (
          <button key={k} onClick={() => setGoal(k)} style={{ background: goal === k ? "rgba(108,71,255,0.25)" : "transparent", border: `1px solid ${goal === k ? "#6c47ff" : "#1c1c2e"}`, borderRadius: 20, padding: "3px 10px", fontSize: 11, color: goal === k ? "#8c6fff" : "#444466", fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>
            {v}
          </button>
        ))}
        <button onClick={() => { setMessages([]); setHistory([]); setStage(0); }} style={{ marginLeft: "auto", background: "transparent", border: "none", color: "#333355", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>↺</button>
      </div>

      {/* Messages */}
      <div style={{ flex: 1, overflowY: "auto", padding: "14px 12px", display: "flex", flexDirection: "column", gap: 12 }}>

        {messages.length === 0 && (
          <div style={{ textAlign: "center", padding: "30px 16px" }}>
            <div style={{ fontSize: 44, marginBottom: 14 }}>💬</div>
            <div style={{ color: "#f0f0ff", fontWeight: 700, fontSize: 16, marginBottom: 8 }}>Your Personal Chat Coach</div>
            <div style={{ color: "#444466", fontSize: 13, lineHeight: 1.6, marginBottom: 20 }}>Type what the buyer just said — get the perfect reply instantly.</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center" }}>
              {CHIPS.map(c => (
                <button key={c} onClick={() => send(c)} style={{ background: "#12121e", border: "1px solid #1c1c2e", borderRadius: 20, padding: "7px 12px", fontSize: 12, color: "#8888aa", cursor: "pointer", fontFamily: "inherit" }}>{c}</button>
              ))}
            </div>
          </div>
        )}

        {messages.map((msg, i) => (
          <div key={i} className="msg-anim" style={{ display: "flex", flexDirection: "column", gap: 5 }}>
            {msg.from === "buyer" ? (
              <div style={{ background: "#12121e", border: "1px solid #1c1c2e", borderRadius: "16px 16px 16px 4px", padding: "11px 14px", maxWidth: "82%", alignSelf: "flex-start" }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: "#ff6b6b", textTransform: "uppercase", letterSpacing: "0.8px", marginBottom: 4 }}>👤 They said</div>
                <div style={{ fontSize: 14, color: "#c0c0d0", lineHeight: 1.5 }}>{msg.text}</div>
              </div>
            ) : (
              <>
                <div style={{ background: "linear-gradient(135deg,rgba(108,71,255,0.14),rgba(108,71,255,0.06))", border: "1px solid rgba(108,71,255,0.25)", borderRadius: "16px 16px 4px 16px", padding: "13px 14px", maxWidth: "88%", alignSelf: "flex-end", position: "relative" }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#00d4aa", textTransform: "uppercase", letterSpacing: "0.8px", marginBottom: 4 }}>✨ Say this</div>
                  <div style={{ fontSize: 14, color: "#f0f0ff", lineHeight: 1.6, paddingRight: 54, whiteSpace: "pre-wrap" }}>{msg.text}</div>
                  <button onClick={() => copyText(msg.text, i)} style={{ position: "absolute", top: 10, right: 10, background: "rgba(108,71,255,0.2)", border: "none", borderRadius: 8, padding: "4px 9px", color: copied === i ? "#00d4aa" : "#6c47ff", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                    {copied === i ? "✓" : "Copy"}
                  </button>
                </div>
                {msg.tip && (
                  <div style={{ background: "rgba(0,212,170,0.05)", borderLeft: "3px solid #00d4aa", borderRadius: "0 10px 10px 0", padding: "7px 12px", maxWidth: "86%", alignSelf: "flex-end" }}>
                    <div style={{ fontSize: 10, color: "#00d4aa", fontWeight: 700, textTransform: "uppercase", marginBottom: 2 }}>💡 Why it works</div>
                    <div style={{ fontSize: 12, color: "#4a8a7a", lineHeight: 1.5 }}>{msg.tip}</div>
                  </div>
                )}
              </>
            )}
          </div>
        ))}

        {loading && (
          <div style={{ display: "flex", justifyContent: "flex-end" }}>
            <div style={{ background: "rgba(108,71,255,0.1)", border: "1px solid rgba(108,71,255,0.2)", borderRadius: "16px 16px 4px 16px", padding: "14px 18px", display: "flex", gap: 6, alignItems: "center" }}>
              {[0, 0.2, 0.4].map((d, i) => (
                <div key={i} style={{ width: 8, height: 8, background: "#6c47ff", borderRadius: "50%", animation: `bounce 1.2s ${d}s infinite` }} />
              ))}
            </div>
          </div>
        )}

        <div ref={bottomRef} />
      </div>

      {/* Input */}
      <div style={{ background: "#0a0a14", borderTop: "1px solid #1c1c2e", padding: "10px 12px 24px", flexShrink: 0 }}>
        <div style={{ fontSize: 10, color: "#333355", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.8px", marginBottom: 8 }}>● What did they say?</div>
        <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
          <textarea
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(input); } }}
            placeholder="Type their message..."
            rows={1}
            style={{ flex: 1, background: "#12121e", border: "1px solid #1c1c2e", borderRadius: 14, padding: "11px 14px", color: "#f0f0ff", fontSize: 15, fontFamily: "inherit", outline: "none", resize: "none", lineHeight: 1.5 }}
          />
          <button onClick={() => send(input)} disabled={loading || !input.trim()} style={{ width: 44, height: 44, background: loading || !input.trim() ? "#12121e" : "linear-gradient(135deg,#6c47ff,#8c5fff)", border: "none", borderRadius: 12, color: loading || !input.trim() ? "#333355" : "#fff", fontSize: 18, cursor: loading || !input.trim() ? "default" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, boxShadow: loading || !input.trim() ? "none" : "0 4px 16px rgba(108,71,255,0.4)" }}>↑</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
